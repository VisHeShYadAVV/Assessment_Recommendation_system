services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./Backend/.env
    # Depending on what your API needs, you might want to add depends_on for a db, etc.

  frontend:
    build:
      context: ./React_Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./React_Frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
